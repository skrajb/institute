<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smartech Software Activation</title>

<script src="activation.js"></script>

<style>

body{
font-family:'Bookman Old Style',serif;
background:#f8f9fa;
margin:0;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.header img{
height:70px;
}

/* NAVBAR */

nav{
background:#00295f;
padding:10px 20px;
}

nav ul{
list-style:none;
margin:0;
padding:0;
display:flex;
}

nav ul li a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:16px;
font-weight:bold;
padding:6px 10px;
border-radius:6px;
}

nav ul li a:hover{
background:white;
color:#00295f;
}

/* MAIN AREA */

.container{
width:90%;
max-width:900px;
margin:40px auto;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card h2{
text-align:center;
color:#00295f;
margin-bottom:30px;
}

/* ACTIVATION BOX */

.activation-box{
border:1px solid #eee;
border-radius:10px;
padding:20px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.title{
font-size:18px;
font-weight:bold;
color:#00295f;
}

.status{
font-weight:bold;
margin-top:5px;
}

.active{
color:green;
}

.inactive{
color:red;
}

/* INPUT */

input{
padding:10px;
font-size:16px;
border:2px solid #00295f;
border-radius:6px;
width:220px;
margin-right:10px;
}

/* BUTTON */

button{
background:#00295f;
color:white;
border:none;
padding:10px 18px;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:black;
}

</style>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="sidebar.css">

<script src="sidebar.js"></script>

</head>

<body>


<div class="main">

<button id="menuToggle">☰</button>

<div class="container">

<div class="card">

<h2>Software Activation Panel</h2>


<div class="activation-box">
<div>
<div class="title">English Typing Tutor</div>
<div id="englishStatus" class="status inactive">Not Activated</div>
</div>

<div>
<input id="englishCode" placeholder="Enter Activation Code">
<button onclick="activateEnglish()">Activate</button>
</div>
</div>

<div class="activation-box">
<div>
<div class="title">Punjabi Typing Tutor</div>
<div id="punjabiStatus" class="status inactive">Not Activated</div>
</div>

<div>
<input id="punjabiCode" placeholder="Enter Activation Code">
<button onclick="activatePunjabi()">Activate</button>
</div>
</div>
<!--<div class="activation-box">
<div>
<div class="title">Exercise Manager</div>
<div id="softwareStatus" class="status inactive">Not Activated</div>
</div>

<div>
<input id="softwareCode" placeholder="Enter Activation Code">
<button onclick="activateSoftware()">Activate</button>
</div>
</div>-->
<p style="color:red;";><b>*Before Accessing the English, Punjabi Typing Tutor and Exercise Manager you have to Activate it using Activation codes.</b></p>

</div>

</div>
</div>
