/* ====== PAGE LAYOUT ====== */
body {

.exercise-box {

.exercise-box:hover {

.exercise-box h2 {
  color: #00295f;
  text-align: center;
  margin-bottom: 15px;

  .exercise-btn {
    width: 100%;
    margin: 6px 0;
  }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
